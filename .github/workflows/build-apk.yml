name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'App ID (cuid)'
        required: true
        type: string
      app_name:
        description: 'App display name'
        required: true
        type: string
      short_name:
        description: 'Short name (launcher)'
        required: true
        type: string
      target_url:
        description: 'Target URL loaded in WebView'
        required: true
        type: string
      theme_color:
        description: 'Theme color hex (e.g. #667eea)'
        required: false
        default: '#667eea'
        type: string
      bg_color:
        description: 'Background color hex'
        required: false
        default: '#ffffff'
        type: string
      icon_url:
        description: 'App icon URL (192×192 PNG)'
        required: false
        default: ''
        type: string
      slug:
        description: 'App slug (used for APK filename and package ID)'
        required: true
        type: string
      callback_url:
        description: 'POST callback URL for build result'
        required: true
        type: string
      build_secret:
        description: 'Shared HMAC secret for callback auth'
        required: true
        type: string

jobs:
  build-apk:
    name: 'APK — ${{ inputs.app_name }}'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Toolchain setup ───────────────────────────────────────
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses & install packages
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" \
            2>/dev/null || true

      # ── 3. Generate Capacitor project ────────────────────────────
      - name: Generate Capacitor Android project
        id: generate
        env:
          APP_ID: ${{ inputs.app_id }}
          APP_NAME: ${{ inputs.app_name }}
          TARGET_URL: ${{ inputs.target_url }}
          SLUG: ${{ inputs.slug }}
        run: |
          set -euo pipefail

          BUILD_DIR="/tmp/cap-build-${APP_ID}"
          mkdir -p "${BUILD_DIR}/www"
          cd "${BUILD_DIR}"

          # package.json — minimal Capacitor 6
          cat > package.json << 'PKGJSON'
          {
            "name": "appnexu-apk",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/cli": "^6.0.0",
              "@capacitor/core": "^6.0.0"
            }
          }
          PKGJSON

          npm install 2>&1 | tail -10

          # Sanitize Java package ID: letters/numbers/underscores, max 30 chars
          PKG_SUFFIX=$(echo "${SLUG}" | tr -cd 'a-zA-Z0-9_' | head -c 30)
          PKG_ID="com.appnexu.${PKG_SUFFIX}"

          # capacitor.config.json
          cat > capacitor.config.json << CAPCFG
          {
            "appId": "${PKG_ID}",
            "appName": "${APP_NAME}",
            "webDir": "www",
            "server": {
              "url": "${TARGET_URL}",
              "cleartext": true,
              "androidScheme": "https"
            }
          }
          CAPCFG

          # Minimal www/index.html (web dir is required by Capacitor)
          cat > www/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Loading...</title>
          </head>
          <body style="margin:0;background:#fff;"></body>
          </html>
          HTML

          # Add Android platform (reads capacitor.config.json)
          npx cap add android

          echo "build_dir=${BUILD_DIR}" >> "$GITHUB_OUTPUT"

      # ── 4. Gradle build ──────────────────────────────────────────
      - name: Build debug APK
        working-directory: /tmp/cap-build-${{ inputs.app_id }}/android
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew assembleDebug \
            --no-daemon \
            --warning-mode none \
            -q \
            2>&1 | tail -40

      # ── 5. Validate APK ──────────────────────────────────────────
      - name: Validate APK (>1 MB)
        id: validate
        env:
          APP_ID: ${{ inputs.app_id }}
        run: |
          set -euo pipefail
          APK_PATH=$(find "/tmp/cap-build-${APP_ID}/android/app/build/outputs/apk/debug" -name "*.apk" | head -1)

          if [ -z "${APK_PATH}" ]; then
            echo "::error::APK file not found after Gradle build."
            exit 1
          fi

          SIZE=$(stat -c%s "${APK_PATH}")
          echo "APK: ${APK_PATH}  (${SIZE} bytes)"

          if [ "${SIZE}" -lt 1000000 ]; then
            echo "::error::APK size ${SIZE} bytes is below 1 MB minimum."
            exit 1
          fi

          echo "apk_path=${APK_PATH}" >> "$GITHUB_OUTPUT"

      # ── 6. Upload to Vercel Blob ─────────────────────────────────
      - name: Upload APK to Vercel Blob
        id: upload
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          APK_PATH: ${{ steps.validate.outputs.apk_path }}
          APP_ID: ${{ inputs.app_id }}
          SLUG: ${{ inputs.slug }}
        run: |
          set -euo pipefail

          PATHNAME="apk/${SLUG}-${APP_ID}.apk"

          RESPONSE=$(curl -fsS -X PUT \
            -H "Authorization: Bearer ${BLOB_READ_WRITE_TOKEN}" \
            -H "x-content-type: application/vnd.android.package-archive" \
            --data-binary "@${APK_PATH}" \
            "https://blob.vercel-storage.com/${PATHNAME}")

          echo "Blob response: ${RESPONSE}"

          BLOB_URL=$(echo "${RESPONSE}" | jq -r '.url // empty')

          if [ -z "${BLOB_URL}" ]; then
            echo "::error::Vercel Blob upload failed. Response: ${RESPONSE}"
            exit 1
          fi

          echo "Uploaded APK → ${BLOB_URL}"
          echo "blob_url=${BLOB_URL}" >> "$GITHUB_OUTPUT"

      # ── 7a. Callback — success ───────────────────────────────────
      - name: Send success callback
        if: success()
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          BUILD_SECRET: ${{ inputs.build_secret }}
          APP_ID: ${{ inputs.app_id }}
          BLOB_URL: ${{ steps.upload.outputs.blob_url }}
        run: |
          curl -fsS -X POST "${CALLBACK_URL}" \
            -H "Content-Type: application/json" \
            -H "x-apk-build-secret: ${BUILD_SECRET}" \
            -d "{\"app_id\":\"${APP_ID}\",\"status\":\"READY\",\"download_url\":\"${BLOB_URL}\"}" \
            || echo "WARNING: callback returned non-zero (non-critical)"

      # ── 7b. Callback — failure ───────────────────────────────────
      - name: Send failure callback
        if: failure()
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          BUILD_SECRET: ${{ inputs.build_secret }}
          APP_ID: ${{ inputs.app_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          ERROR_MSG="Build failed. See logs: ${RUN_URL}"
          curl -fsS -X POST "${CALLBACK_URL}" \
            -H "Content-Type: application/json" \
            -H "x-apk-build-secret: ${BUILD_SECRET}" \
            -d "{\"app_id\":\"${APP_ID}\",\"status\":\"FAILED\",\"error_message\":\"${ERROR_MSG}\"}" \
            || echo "WARNING: failure callback returned non-zero (non-critical)"

      # ── 8. Upload APK as GH artifact (backup) ────────────────────
      - name: Upload APK artifact (backup)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.app_id }}
          path: ${{ steps.validate.outputs.apk_path }}
          retention-days: 7
